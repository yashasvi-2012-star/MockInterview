<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIPER-VIPER-GAME</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root{
    --walnut-1:#2a1c12;
    --walnut-2:#1a1109;
    --brass:#c9a227;
    --brass-dim:#7a641c;
    --amber:#ffb400;
    --amber-dim:#7a4a00;
    --amber-glow:#ffcf5c;
    --screen-bg:#120d05;
    --danger:#ff4d2e;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at center, #3a281a 0%, #140d08 75%);
    font-family:'VT323', monospace;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .cabinet{
    position:relative;
    width:min(94vw, 560px);
    padding:22px 22px 26px;
    background:
      linear-gradient(155deg, #3c2a1a 0%, var(--walnut-1) 35%, var(--walnut-2) 100%);
    border-radius:18px;
    box-shadow:
      0 0 0 2px #0a0603,
      0 25px 60px -15px rgba(0,0,0,0.8),
      inset 0 2px 3px rgba(255,255,255,0.06),
      inset 0 -6px 14px rgba(0,0,0,0.5);
  }

  .cabinet::before{
    content:"";
    position:absolute; inset:6px;
    border-radius:14px;
    border:1px solid rgba(201,162,39,0.15);
    pointer-events:none;
  }

  .screw{
    position:absolute;
    width:11px; height:11px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #e8c15a, var(--brass-dim) 70%, #4a3a0f);
    box-shadow: 0 1px 2px rgba(0,0,0,0.6), inset 0 0 2px rgba(0,0,0,0.5);
  }
  .screw::after{
    content:"";
    position:absolute; top:50%; left:15%;
    width:70%; height:1.5px;
    background:rgba(0,0,0,0.55);
    transform: translateY(-50%) rotate(35deg);
  }
  .screw.tl{ top:12px; left:12px; }
  .screw.tr{ top:12px; right:12px; }
  .screw.bl{ bottom:14px; left:12px; }
  .screw.br{ bottom:14px; right:12px; }

  .marquee{
    text-align:center;
    margin-bottom:14px;
    position:relative;
  }
  .marquee h1{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(15px, 4.4vw, 22px);
    color:var(--amber);
    letter-spacing:2px;
    margin:0;
    text-shadow:
      0 0 6px rgba(255,180,0,0.8),
      0 0 18px rgba(255,180,0,0.4);
  }
  .marquee p{
    font-size:13px;
    letter-spacing:4px;
    color:var(--brass);
    margin:6px 0 0;
    opacity:0.75;
    text-transform:uppercase;
  }

  .screen-frame{
    position:relative;
    background:#000;
    border-radius:10px;
    padding:14px;
    box-shadow:
      inset 0 0 0 3px #050302,
      inset 0 0 30px rgba(0,0,0,0.9),
      0 0 0 6px #0e0805,
      0 0 0 7px rgba(201,162,39,0.25);
  }

  #stage{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background: radial-gradient(ellipse at 50% 40%, #1c1305 0%, var(--screen-bg) 78%);
    border-radius:6px;
    overflow:hidden;
  }

  #board{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }

  /* CRT scanlines + vignette + flicker */
  .scanlines{
    position:absolute; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.22) 3px,
      rgba(0,0,0,0.22) 3px
    );
    mix-blend-mode:multiply;
    animation: flicker 6s infinite;
  }
  .vignette{
    position:absolute; inset:0;
    pointer-events:none;
    box-shadow: inset 0 0 60px 18px rgba(0,0,0,0.85);
    border-radius:6px;
  }
  @keyframes flicker{
    0%,100%{ opacity:0.95; }
    50%{ opacity:1; }
    52%{ opacity:0.85; }
    53%{ opacity:0.97; }
  }

  .hud{
    position:absolute; inset:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 14px;
    pointer-events:none;
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:var(--amber);
    text-shadow:0 0 6px rgba(255, 180, 0, 0.8);
    z-index:3;
  }
  .hud .lbl{ font-size:8px; opacity:0.7; letter-spacing:1px; display:block; margin-bottom:4px;}

  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    background:rgba(10,7,3,0.82);
    color:var(--amber);
    font-family:'Press Start 2P', monospace;
    z-index:5;
    gap:14px;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay h2{
    font-size:clamp(16px,5vw,24px);
    margin:0;
    text-shadow:0 0 10px rgba(255,180,0,0.9);
  }
  .overlay .sub{
    font-family:'VT323', monospace;
    font-size:18px;
    color:var(--amber-glow);
    max-width:340px;
    line-height:1.5;
    opacity:0.9;
  }
  .btn{
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:#1a1109;
    background:linear-gradient(180deg, var(--amber-glow), var(--amber));
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    box-shadow:0 4px 0 var(--amber-dim), 0 6px 12px rgba(0,0,0,0.5);
    letter-spacing:1px;
    transition: transform 0.08s ease;
  }
  .btn:active{ transform: translateY(3px); box-shadow:0 1px 0 var(--amber-dim); }

  .footer-panel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:16px;
    padding:0 4px;
  }
  .power{
    display:flex; align-items:center; gap:8px;
    font-size:14px; color:var(--brass); letter-spacing:2px;
  }
  .power .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber), 0 0 2px var(--amber);
    animation:pulse 2.2s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .hiscore{
    font-size:14px; color:var(--brass); letter-spacing:1px;
    text-align:right;
  }
  .hiscore b{ color:var(--amber-glow); }

  /* Touch controls (mobile) */
  .dpad{
    display:none;
    margin-top:16px;
    grid-template-columns:56px 56px 56px;
    grid-template-rows:50px 50px 50px;
    gap:6px;
    justify-content:center;
  }
  .dpad button{
    font-family:'Press Start 2P';
    font-size:16px;
    color:var(--amber);
    background:linear-gradient(180deg,#3c2a1a,#241809);
    border:1px solid var(--brass-dim);
    border-radius:8px;
    box-shadow:0 3px 0 #0a0603, inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .dpad button:active{ transform:translateY(2px); box-shadow:0 1px 0 #0a0603; }
  .dpad .up{ grid-column:2; grid-row:1; }
  .dpad .left{ grid-column:1; grid-row:2; }
  .dpad .down{ grid-column:2; grid-row:2; }
  .dpad .right{ grid-column:3; grid-row:2; }

  @media (max-width:600px){
    .dpad{ display:grid; }
  }

  .hint{
    text-align:center;
    color:var(--brass-dim);
    font-size:13px;
    margin-top:10px;
    letter-spacing:1px;
  }


</style>

</head>
<body>

<div class="cabinet">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>

  <div class="marquee">
    <h1>VIPER-VIPER</h1>
    <p>A Simple Game </p>
  </div>

  <div class="screen-frame">
    <div id="stage">
      <canvas id="board"></canvas>
      <div class="hud">
        <div>
          <span class="lbl">SCORE</span>
          <span id="score">000</span>
        </div>
        <div style="text-align:right;">
          <span class="lbl">BEST</span>
          <span id="best">000</span>
        </div>
      </div>

      <div class="overlay show" id="startOverlay">
        <h2>VIPER-VIPER</h2>
        <div class="sub">Guide the signal through the grid.<br>Eat to grow. Don't cross yourself<br>or the wall.</div>
        <button class="btn" id="startBtn">Start!!</button>
        <div class="hint">Arrows / WASD to steer &middot; Space to pause</div>
      </div>

      <div class="overlay" id="pauseOverlay">
        <h2>Paused</h2>
        <button class="btn" id="resumeBtn">Resume</button>
      </div>

      <div class="overlay" id="overOverlay">
        <h2 id="overTitle">Signal Lost</h2>
        <div class="sub" id="overSub">Final score: 0</div>
        <button class="btn" id="retryBtn">Play Again</button>
      </div>

      <div class="scanlines"></div>
      <div class="vignette"></div>
    </div>
  </div>

  <div class="footer-panel">
    <div class="power"><span class="dot"></span>NICE GAME RIGHT ?!!?</div>
    <div class="hiscore">HIGH SCORE&nbsp;<b id="hiscoreFoot">000</b></div>
  </div>

  <div class="dpad" id="dpad">
    <button class="up">&#9650;</button>
    <button class="left">&#9664;</button>
    <button class="down">&#9660;</button>
    <button class="right">&#9654;</button>
  </div>

  <div class="hint" style="margin-top:14px;">&#9654; Swipe on screen also works on mobile</div>
</div>
<script>




(function(){
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const GRID = 20;
  let cell = 0;

  let snake, dir, nextDir, dirQueue, food, score, best = 0, running, paused, speedMs, loopTimer;
  let particles = [];

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const hiscoreFoot = document.getElementById('hiscoreFoot');
  const startOverlay = document.getElementById('startOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const overOverlay = document.getElementById('overOverlay');
  const overSub = document.getElementById('overSub');
  const overTitle = document.getElementById('overTitle');

  function resize(){
    const stage = document.getElementById('stage');
    const size = stage.clientWidth;
    canvas.width = size * devicePixelRatio;
    canvas.height = size * devicePixelRatio;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    cell = canvas.width / GRID;
  }
  window.addEventListener('resize', resize);

  function resetState(){
    const mid = Math.floor(GRID/2);
    snake = [
      {x:mid-1,y:mid}, {x:mid-2,y:mid}, {x:mid-3,y:mid}
    ];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    dirQueue = [];
    score = 0;
    speedMs = 130;
    particles = [];
    placeFood();
    updateHud();
  }

  function placeFood(){
    let ok = false;
    while(!ok){
      food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
      ok = !snake.some(s => s.x===food.x && s.y===food.y);
    }
  }

  function updateHud(){
    scoreEl.textContent = String(score).padStart(3,'0');
    bestEl.textContent = String(best).padStart(3,'0');
    hiscoreFoot.textContent = String(best).padStart(3,'0');
  }

  function showOverlay(el){ el.classList.add('show'); }
  function hideOverlay(el){ el.classList.remove('show'); }
  function hideAllOverlays(){ [startOverlay,pauseOverlay,overOverlay].forEach(hideOverlay); }

  function gameOver(){
    running = false;
    clearTimeout(loopTimer);
    if(score > best){ best = score; }
    updateHud();
    overSub.textContent = 'Final score: ' + score + (score>=best && score>0 ? '  •  NEW BEST!' : '');
    overTitle.textContent = 'Signal Lost';
    showOverlay(overOverlay);
  }

  function step(){
    if(dirQueue.length){ dir = dirQueue.shift(); }
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if(head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID){
      gameOver(); return;
    }
    if(snake.some(s => s.x===head.x && s.y===head.y)){
      gameOver(); return;
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
      score += 10;
      spawnParticles(food.x, food.y);
      placeFood();
      speedMs = Math.max(60, speedMs - 2.5);
      updateHud();
    } else {
      snake.pop();
    }

    draw();
    loopTimer = setTimeout(step, speedMs);
  }

  function spawnParticles(gx, gy){
    for(let i=0;i<10;i++){
      particles.push({
        x: (gx+0.5)*cell, y: (gy+0.5)*cell,
        vx: (Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
        life: 1
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = 'rgba(255,180,0,0.05)';
    ctx.lineWidth = 1;
    for(let i=1;i<GRID;i++){
      ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(canvas.width,i*cell); ctx.stroke();
    }

 
    const fx = (food.x+0.5)*cell, fy = (food.y+0.5)*cell;
    const r = cell*0.32;
    const grad = ctx.createRadialGradient(fx,fy,0,fx,fy,r*2.2);
    grad.addColorStop(0,'rgba(255,77,46,1)');
    grad.addColorStop(1,'rgba(255,77,46,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(fx,fy,r*2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff4d2e';
    ctx.beginPath(); ctx.arc(fx,fy,r,0,Math.PI*2); ctx.fill();

  
    snake.forEach((s,i)=>{
      const x = s.x*cell, y = s.y*cell;
      const t = i===0 ? 1 : Math.max(0.35, 1 - i/snake.length*0.8);
      ctx.fillStyle = i===0 ? '#ffcf5c' : `rgba(255,180,0,${t})`;
      ctx.shadowColor = 'rgba(255,180,0,0.8)';
      ctx.shadowBlur = i===0 ? 14 : 6;
      const pad = cell*0.09;
      roundRect(ctx, x+pad, y+pad, cell-pad*2, cell-pad*2, cell*0.22);
      ctx.fill();
    });
    ctx.shadowBlur = 0;

    particles.forEach(p=>{
      ctx.fillStyle = `rgba(255,180,0,${p.life})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,3*devicePixelRatio,0,Math.PI*2); ctx.fill();
      p.x += p.vx; p.y += p.vy; p.life -= 0.05;
    });
    particles = particles.filter(p=>p.life>0);
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function ambientParticleLoop(){
    if(particles.length){ draw(); }
    requestAnimationFrame(ambientParticleLoop);
  }

  function setDirection(nx, ny){
    if(!running || paused) return;
    const last = dirQueue.length ? dirQueue[dirQueue.length-1] : dir;
    if(nx === -last.x && ny === -last.y) return; // no reverse
    if(nx === last.x && ny === last.y) return; // no duplicate
    if(dirQueue.length >= 2) return; // don't let the queue outrun the ticks
    dirQueue.push({x:nx, y:ny});
  }

  function startGame(){
    resize();
    resetState();
    hideAllOverlays();
    running = true; paused = false;
    draw();
    clearTimeout(loopTimer);
    loopTimer = setTimeout(step, speedMs);
  }

  function togglePause(){
    if(!running) return;
    paused = !paused;
    if(paused){
      clearTimeout(loopTimer);
      showOverlay(pauseOverlay);
    } else {
      hideOverlay(pauseOverlay);
      loopTimer = setTimeout(step, speedMs);
    }
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);
  document.getElementById('resumeBtn').addEventListener('click', togglePause);

  window.addEventListener('keydown', (e)=>{
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0,-1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0,1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1,0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1,0); break;
      case ' ': e.preventDefault();
        if(!running){ startGame(); } else { togglePause(); }
        break;
    }
  });

  const dpad = document.getElementById('dpad');
  dpad.querySelector('.up').addEventListener('click', ()=>setDirection(0,-1));
  dpad.querySelector('.down').addEventListener('click', ()=>setDirection(0,1));
  dpad.querySelector('.left').addEventListener('click', ()=>setDirection(-1,0));
  dpad.querySelector('.right').addEventListener('click', ()=>setDirection(1,0));

 
  let touchStart = null;
  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', (e)=>{
    touchStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
  }, {passive:true});
  stage.addEventListener('touchend', (e)=>{
    if(!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if(Math.abs(dx) > Math.abs(dy)){
      if(Math.abs(dx) > 20) setDirection(dx>0?1:-1, 0);
    } else {
      if(Math.abs(dy) > 20) setDirection(0, dy>0?1:-1);
    }
    touchStart = null;
  }, {passive:true});

  resize();
  resetState();
  draw();
  ambientParticleLoop();
})();
  </script>
</body>
</html>
